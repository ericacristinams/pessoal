<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossa Construção</title>

  <style>
    :root {
      --bg: #050b12;
      --surface: #07131f;
      --card: rgba(9, 22, 34, 0.94);
      --border: rgba(255,255,255,0.14);
      --text: #f8fafc;
      --muted: #9aa8b5;
      --accent: #f8b400;
      --blue: #1685ff;
      --cyan: #17d4c5;
      --green: #8bd450;
      --yellow: #f8b400;
      --purple: #a855f7;
      --orange: #ff7a00;
      --gray: #64748b;
      --dark-piece: #1f2937;
    }

    html[data-theme="light"] {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --card: rgba(255,255,255,0.96);
      --border: rgba(15,23,42,0.14);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #d89500;
      --dark-piece: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 8%, rgba(248,180,0,.10), transparent 35%),
        radial-gradient(circle at 20% 40%, rgba(22,133,255,.13), transparent 30%),
        var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .app {
      max-width: 1180px;
      margin: auto;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: rgba(255,255,255,.025);
      overflow: hidden;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 50;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .header {
      padding: 38px 48px 16px;
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    h1 {
      font-size: clamp(30px, 4vw, 44px);
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 17px;
    }

    .subtitle strong {
      color: var(--accent);
    }

    .overall-card {
      min-width: 220px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 20px;
      padding: 18px 22px;
    }

    .overall-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .overall-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 6px;
    }

    .overall-number {
      font-size: 42px;
      color: var(--accent);
      font-weight: 900;
    }

    .ring {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--ring), rgba(148,163,184,.20) 0);
      position: relative;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      background: var(--surface);
      border-radius: 50%;
    }

    .tabs {
      margin: 0 auto 18px;
      width: fit-content;
      display: flex;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 5px;
      gap: 4px;
    }

    .tab {
      padding: 11px 22px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .tab.active {
      color: var(--accent);
      background: rgba(248,180,0,.12);
      border: 1px solid rgba(248,180,0,.28);
    }

    .board {
      position: relative;
      height: 875px;
      padding: 0 28px;
    }

    .connectors {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
    }

    .puzzle-stage {
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      width: 500px;
      height: 640px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.22);
      background: var(--surface);
      box-shadow: 0 26px 70px rgba(0,0,0,.35);
      z-index: 5;
    }

    .puzzle-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: saturate(1.05) contrast(1.02);
    }

    .puzzle-mask {
      position: absolute;
      inset: 0;
      background: rgba(2,8,16,.08);
      z-index: 2;
    }

    .puzzle-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .puzzle-lines path {
      fill: none;
      stroke: rgba(8, 12, 18, .42);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter:
        drop-shadow(0 0 1px rgba(255,255,255,.22))
        drop-shadow(0 0 2px rgba(0,0,0,.32));
    }

    .piece-marker {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      z-index: 14;
      opacity: var(--opacity);
      background: var(--color);
      border-radius: 999px;
      box-shadow: 0 0 13px var(--color);
      border: 2px solid rgba(255,255,255,.42);
    }

    .card {
      position: absolute;
      width: 210px;
      min-height: 108px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      padding: 10px;
      z-index: 20;
      opacity: var(--opacity);
      box-shadow: 0 14px 34px rgba(0,0,0,.20);
    }

    .card-inner {
      display: block;
    }

    .card small {
      color: var(--color);
      font-weight: 900;
      font-size: 12px;
    }

    .card h3 {
      font-size: 11px;
      text-transform: uppercase;
      line-height: 1.15;
      margin: 3px 0 5px;
    }

    .card p {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .percent {
      color: var(--color);
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .bar {
      height: 4px;
      background: rgba(148,163,184,.25);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: var(--progress);
      background: var(--color);
    }

    .legend {
      position: absolute;
      left: 50%;
      top: 682px;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 12px;
      z-index: 18;
      white-space: nowrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-piece {
      width: 18px;
      height: 18px;
      background: var(--color);
      clip-path: path("M 3 0 H 10 C 10 4 15 4 15 0 H 18 V 7 C 14 7 14 12 18 12 V 18 H 11 C 11 14 6 14 6 18 H 0 V 11 C 4 11 4 6 0 6 V 0 Z");
    }

    .message {
      position: absolute;
      left: 50%;
      top: 724px;
      transform: translateX(-50%);
      width: 480px;
      padding: 18px 22px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 18px;
      text-align: center;
      z-index: 18;
    }

    .message strong {
      color: var(--accent);
      font-size: 19px;
    }

    .message p {
      color: var(--muted);
      margin-top: 5px;
    }

    .flow {
      margin: 0 22px 26px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(255,255,255,.025);
      padding: 24px 30px 28px;
    }

    .flow h2 {
      font-size: 20px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .flow-track {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
      align-items: start;
      position: relative;
    }

    .flow-step {
      position: relative;
      z-index: 2;
    }

    .step-number {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--color);
      color: var(--color);
      display: grid;
      place-items: center;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .flow-step h3 {
      font-size: 13px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .flow-step p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      min-height: 34px;
    }

    .mini {
      height: 116px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-top: 14px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      background-color: #111923;
    }

    .mini-piece {
      position: absolute;
      width: 44px;
      height: 44px;
      background: var(--color);
      clip-path: path("M 6 0 H 23 C 23 8 34 8 34 0 H 44 V 16 C 36 16 36 28 44 28 V 44 H 28 C 28 36 16 36 16 44 H 0 V 28 C 8 28 8 16 0 16 V 0 Z");
    }

    .mini-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .mini-lines path {
      fill: none;
      stroke: rgba(0,0,0,.38);
      stroke-width: 3.5;
      stroke-linecap: round;
      filter: drop-shadow(0 0 1px rgba(255,255,255,.22));
    }

    .flow-arrow {
      position: absolute;
      top: 134px;
      right: -18px;
      color: var(--muted);
      font-size: 32px;
      z-index: 3;
    }

    .flow-progress {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
    }

    .progress-segment {
      height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green), var(--purple), var(--yellow));
      opacity: .75;
      border-radius: 999px;
      position: relative;
    }

    .progress-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--color);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 18px var(--color);
    }

    .bottom-nav {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 18px 24px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .nav-active {
      color: var(--accent);
      font-weight: 800;
    }

    @media (max-width: 760px) {
      body { padding: 12px; }

      .header {
        flex-direction: column;
        padding: 28px 22px 16px;
      }

      .overall-card {
        width: 100%;
      }

      .board {
        height: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 0 18px 24px;
      }

      .connectors {
        display: none;
      }

      .puzzle-stage,
      .card,
      .legend,
      .message {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        transform: none !important;
        width: 100%;
      }

      .puzzle-stage {
        height: 640px;
      }

      .legend {
        flex-wrap: wrap;
      }

      .flow-track {
        display: flex;
        overflow-x: auto;
        gap: 18px;
        padding-bottom: 12px;
      }

      .flow-step {
        min-width: 190px;
      }

      .flow-arrow {
        display: none;
      }

      .bottom-nav {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <button class="theme-toggle" onclick="toggleTheme()">Trocar tema</button>

    <header class="header">
      <div>
        <h1>Nossa Construção</h1>
        <p class="subtitle">
          Cada peça importa. <strong>Juntas</strong>, construímos algo extraordinário.
        </p>
      </div>

      <aside class="overall-card">
        <span>Progresso geral</span>
        <div class="overall-wrap">
          <div class="overall-number" id="overallProgress">0%</div>
          <div class="ring" id="overallRing"></div>
        </div>
      </aside>
    </header>

    <div class="tabs">
      <div class="tab active">▦ Visão geral</div>
      <div class="tab">☷ Por área</div>
    </div>

    <section class="board" id="board">
      <svg class="connectors" id="connectors"></svg>

      <div class="puzzle-stage" id="puzzleStage">
        <div class="puzzle-img" id="puzzleImage"></div>
        <div class="puzzle-mask"></div>

        <svg class="puzzle-lines" viewBox="0 0 600 720" preserveAspectRatio="none">
          <path d="M0 118 C38 118 34 72 72 72 C110 72 104 118 145 118 H245 C245 78 292 84 292 118 H392 C392 78 440 84 440 118 H600" />
          <path d="M0 255 C44 255 36 210 76 210 C116 210 106 255 151 255 H260 C260 218 312 224 312 255 H410 C410 218 462 224 462 255 H600" />
          <path d="M0 395 C40 395 38 352 78 352 C118 352 110 395 155 395 H255 C255 358 305 364 305 395 H415 C415 358 465 364 465 395 H600" />
          <path d="M0 535 C45 535 36 492 76 492 C116 492 106 535 150 535 H260 C260 500 310 506 310 535 H410 C410 500 460 506 460 535 H600" />
          <path d="M120 0 C120 45 74 36 74 76 C74 116 120 106 120 150 V260 C82 260 86 310 120 310 V420 C82 420 86 470 120 470 V720" />
          <path d="M250 0 C250 45 204 36 204 76 C204 116 250 106 250 150 V260 C212 260 216 310 250 310 V420 C212 420 216 470 250 470 V720" />
          <path d="M380 0 C380 45 334 36 334 76 C334 116 380 106 380 150 V260 C342 260 346 310 380 310 V420 C342 420 346 470 380 470 V720" />
          <path d="M510 0 C510 45 464 36 464 76 C464 116 510 106 510 150 V260 C472 260 476 310 510 310 V420 C472 420 476 470 510 470 V720" />
        </svg>
      </div>

      <div class="legend" id="legend"></div>

      <div class="message">
        <strong>Estamos evoluindo 1% por dia.</strong>
        <p>Peça por peça, construímos o extraordinário.</p>
      </div>
    </section>

    <section class="flow">
      <h2>Como as peças se encaixam</h2>
      <div class="flow-track" id="flowGrid"></div>
      <div class="flow-progress" id="flowProgress"></div>
    </section>

    <nav class="bottom-nav">
      <div class="nav-active">⌂<br>Visão geral</div>
      <div>▣<br>Linha do tempo</div>
      <div>♕<br>Conquistas</div>
      <div>◴<br>Atualizações</div>
      <div>♙<br>Time</div>
    </nav>
  </main>

  <script>
    const config = {
      theme: "dark",
      image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80"
    };

    const projectPieces = [
      { id:"p01", title:"Planejamento Estratégico", description:"Definição de objetivos, escopo e roadmap.", percent:100, color:"var(--blue)", puzzle:{x:28,y:12}, label:{x:115,y:20} },
      { id:"p02", title:"Alinhamento com Stakeholders", description:"Decisões e validações importantes.", percent:100, color:"var(--cyan)", puzzle:{x:25,y:34}, label:{x:115,y:145} },
      { id:"p03", title:"Pesquisa e Levantamentos", description:"Entendimento profundo do contexto.", percent:85, color:"var(--green)", puzzle:{x:28,y:52}, label:{x:115,y:270} },
      { id:"p04", title:"Desenvolvimento", description:"Construção da solução e features principais.", percent:70, color:"var(--yellow)", puzzle:{x:36,y:71}, label:{x:115,y:395} },
      { id:"p05", title:"Testes e Validações", description:"Testes de qualidade e ajustes.", percent:40, color:"var(--purple)", puzzle:{x:31,y:86}, label:{x:115,y:520} },

      { id:"p06", title:"Infraestrutura", description:"Ambientes, servidores e ferramentas.", percent:60, color:"var(--purple)", puzzle:{x:76,y:24}, label:{x:855,y:55} },
      { id:"p07", title:"Integrações", description:"APIs, sistemas e conectores.", percent:50, color:"var(--yellow)", puzzle:{x:78,y:46}, label:{x:855,y:185} },
      { id:"p08", title:"Dados e Análises", description:"Métricas, dashboards e indicadores.", percent:30, color:"var(--cyan)", puzzle:{x:74,y:63}, label:{x:855,y:315} },
      { id:"p09", title:"Lançamento", description:"Go-live, comunicação e treinamentos.", percent:10, color:"var(--orange)", puzzle:{x:62,y:84}, label:{x:855,y:445} },
      { id:"p10", title:"Monitoramento", description:"Acompanhamento pós-lançamento e melhorias.", percent:0, color:"var(--gray)", puzzle:{x:72,y:91}, label:{x:855,y:575} }
    ];

    const statusLegend = [
      { label:"Concluído", color:"var(--green)" },
      { label:"Em andamento", color:"var(--yellow)" },
      { label:"Parcial", color:"var(--purple)" },
      { label:"Não iniciado", color:"var(--gray)" }
    ];

    const flowSteps = [
      { n:"01", title:"Peça isolada", text:"Sozinha, parece pequena.", color:"var(--blue)", type:"single" },
      { n:"02", title:"Peças conectadas", text:"Começamos a ver conexão.", color:"var(--cyan)", type:"two" },
      { n:"03", title:"Mais peças", text:"A construção toma forma.", color:"var(--green)", type:"many" },
      { n:"04", title:"Quase lá", text:"Falta pouco para ver o todo.", color:"var(--purple)", type:"image" },
      { n:"05", title:"Visão completa", text:"O todo ganha sentido.", color:"var(--yellow)", type:"image" }
    ];

    function opacity(percent) {
      if (percent === 0) return .32;
      if (percent < 30) return .55;
      if (percent < 70) return .78;
      return 1;
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
    }

    function renderPiecesAndCards() {
      const board = document.getElementById("board");
      const puzzleStage = document.getElementById("puzzleStage");

      projectPieces.forEach((p, i) => {
        const marker = document.createElement("div");
        marker.className = "piece-marker";
        marker.id = `piece-${p.id}`;
        marker.style.left = `${p.puzzle.x}%`;
        marker.style.top = `${p.puzzle.y}%`;
        marker.style.setProperty("--color", p.color);
        marker.style.setProperty("--opacity", opacity(p.percent));
        puzzleStage.appendChild(marker);

        const card = document.createElement("article");
        card.className = "card";
        card.id = `card-${p.id}`;
        card.style.left = `${p.label.x}px`;
        card.style.top = `${p.label.y}px`;
        card.style.setProperty("--color", p.color);
        card.style.setProperty("--opacity", opacity(p.percent));

        card.innerHTML = `
          <div class="card-inner">
            <small>${String(i + 1).padStart(2, "0")}</small>
            <h3>${p.title}</h3>
            <p>${p.description}</p>
            <div class="percent">${p.percent}%</div>
            <div class="bar">
              <div class="bar-fill" style="--progress:${p.percent}%"></div>
            </div>
          </div>
        `;

        board.appendChild(card);
      });
    }

    function renderConnectors() {
      const svg = document.getElementById("connectors");
      const board = document.getElementById("board");
      const rect = board.getBoundingClientRect();

      svg.setAttribute("viewBox", `0 0 ${rect.width} ${rect.height}`);
      svg.innerHTML = "";

      projectPieces.forEach(p => {
        const piece = document.getElementById(`piece-${p.id}`);
        const card = document.getElementById(`card-${p.id}`);
        if (!piece || !card) return;

        const pr = piece.getBoundingClientRect();
        const cr = card.getBoundingClientRect();

        const x1 = pr.left + pr.width / 2 - rect.left;
        const y1 = pr.top + pr.height / 2 - rect.top;
        const isLeft = cr.left < pr.left;
        const x2 = isLeft ? cr.right - rect.left : cr.left - rect.left;
        const y2 = cr.top + Math.min(42, cr.height / 2) - rect.top;
        const c = isLeft ? -28 : 28;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${x1} ${y1} C ${x1+c} ${y1}, ${x2-c} ${y2}, ${x2} ${y2}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", p.color);
        path.setAttribute("stroke-width", p.percent === 0 ? "1.2" : "2");
        path.setAttribute("opacity", p.percent === 0 ? ".32" : ".86");
        svg.appendChild(path);

        [[x1,y1,4.3], [x2,y2,3.6]].forEach(([cx,cy,r]) => {
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", cx);
          dot.setAttribute("cy", cy);
          dot.setAttribute("r", r);
          dot.setAttribute("fill", p.color);
          dot.setAttribute("opacity", p.percent === 0 ? ".32" : "1");
          svg.appendChild(dot);
        });
      });
    }

    function renderLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = statusLegend.map(s => `
        <div class="legend-item">
          <span class="legend-piece" style="--color:${s.color}"></span>
          ${s.label}
        </div>
      `).join("");
    }

    function miniPuzzleLines() {
      return `
        <svg class="mini-lines" viewBox="0 0 140 110" preserveAspectRatio="none">
          <path d="M0 38 C22 38 18 15 38 15 C58 15 54 38 76 38 H140" />
          <path d="M0 76 C22 76 18 54 38 54 C58 54 54 76 76 76 H140" />
          <path d="M46 0 C46 22 24 18 24 38 C24 58 46 54 46 76 V110" />
          <path d="M92 0 C92 22 70 18 70 38 C70 58 92 54 92 76 V110" />
        </svg>
      `;
    }

    function renderFlow() {
      const flow = document.getElementById("flowGrid");

      flow.innerHTML = flowSteps.map((step, index) => {
        let mini = `<div class="mini">${miniPuzzleLines()}`;

        if (step.type === "single") {
          mini += `<div class="mini-piece" style="--color:var(--dark-piece);left:50%;top:34px;transform:translateX(-50%);"></div>`;
        }

        if (step.type === "two") {
          mini += `
            <div class="mini-piece" style="--color:var(--dark-piece);left:34px;top:34px;"></div>
            <div class="mini-piece" style="--color:var(--yellow);left:78px;top:34px;"></div>
          `;
        }

        if (step.type === "many") {
          mini += `
            <div class="mini-piece" style="--color:var(--blue);left:42px;top:12px;"></div>
            <div class="mini-piece" style="--color:var(--green);left:62px;top:54px;"></div>
            <div class="mini-piece" style="--color:var(--yellow);left:100px;top:54px;"></div>
          `;
        }

        if (step.type === "image") {
          mini = `<div class="mini" style="background-image:url('${config.image}')">${miniPuzzleLines()}</div>`;
        } else {
          mini += `</div>`;
        }

        return `
          <article class="flow-step" style="--color:${step.color}">
            <div class="step-number">${step.n}</div>
            <h3>${step.title}</h3>
            <p>${step.text}</p>
            ${mini}
            ${index < flowSteps.length - 1 ? `<div class="flow-arrow">→</div>` : ""}
          </article>
        `;
      }).join("");

      document.getElementById("flowProgress").innerHTML = flowSteps.map(step => `
        <div class="progress-segment">
          <span class="progress-dot" style="--color:${step.color}"></span>
        </div>
      `).join("");
    }

    function renderOverall() {
      const avg = Math.round(
        projectPieces.reduce((a,b) => a + b.percent, 0) / projectPieces.length
      );

      document.getElementById("overallProgress").textContent = `${avg}%`;
      document.getElementById("overallRing").style.setProperty("--ring", `${avg}%`);
    }

    function init() {
      document.documentElement.dataset.theme = config.theme;
      document.getElementById("puzzleImage").style.backgroundImage = `url('${config.image}')`;

      renderPiecesAndCards();
      renderLegend();
      renderFlow();
      renderOverall();

      requestAnimationFrame(renderConnectors);
    }

    window.addEventListener("resize", renderConnectors);
    init();
  </script>
</body>
</html>
